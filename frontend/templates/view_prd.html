<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ product['name'] }} - Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/view_prd.css') }}">
</head>
<body>
    <!-- Top Black Strip -->
    <div class="top-strip">
        <div class="logo">
            <img src="{{ url_for('static', filename='logo1.jpeg') }}" alt="Logo">
        </div>
        <a href="{{ url_for('profile_bp.profile') }}" class="profile-icon">👤</a>
    </div>

    <!-- Back Button -->
    <div class="back-button" onclick="history.back()">
        ←
    </div>

    <!-- Product Details -->
    <div class="product-container">
        <img class="product-image" src="{{ url_for('static', filename='product_images/' + product['image']) }}" alt="{{ product['name'] }}">
        
        <div class="product-info">
            <h2>{{ product['name'] }}</h2>
            <p class="price">₹{{ product['price'] }} <span class="og-price">(₹{{ product['og_price'] }})</span></p>

            <div class="buttons">
                <!-- Wishlist Button -->
                <button id="wishlistBtn" {% if in_wishlist %}disabled{% endif %}>
                    {% if in_wishlist %}Added to Wishlist{% else %}Add to Wishlist{% endif %}
                </button>

                {% if product['quantity'] == 0 %}
                    <button class="sold-out" disabled>Sold Out</button>
                {% else %}
                    <p class="price">Qty:
                        <select id="selected_qty" class="qty-dropdown">
                            {% for i in range(1, product['quantity'] + 1) %}
                                <option value="{{ i }}">{{ i }}</option>
                            {% endfor %}
                        </select>
                    </p>

                    <!-- Cart Button -->
                    <button id="cartBtn" {% if in_cart %}disabled{% endif %}>
                        {% if in_cart %}Added to Cart{% else %}Add to Cart{% endif %}
                    </button>
                {% endif %}
            </div>

            <h3 class="description-heading">Description:</h3>
            <p class="description">{{ product['description'] }}</p>
        </div>
    </div>

    <!-- AJAX Script -->
    <script>
        const productId = {{ product['id'] | tojson }};
        const wishlistBtn = document.getElementById("wishlistBtn");
        const cartBtn = document.getElementById("cartBtn");
        const qtySelect = document.getElementById("selected_qty");

        if (wishlistBtn && !wishlistBtn.disabled) {
            wishlistBtn.addEventListener("click", function () {
                fetch(`/product/action/${productId}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ action: "wishlist" })
                }).then(res => res.json())
                .then(data => {
                    if (data.success) {
                        wishlistBtn.textContent = "Added to Wishlist";
                        wishlistBtn.disabled = true;
                    } else {
                        alert(data.error || "Something went wrong.");
                    }
                }).catch(() => alert("Network error."));
            });
        }

        if (cartBtn && !cartBtn.disabled) {
            cartBtn.addEventListener("click", function () {
                const qty = qtySelect?.value || 1;
                fetch(`/product/action/${productId}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ action: "cart", selected_qty: qty })
                }).then(res => res.json())
                .then(data => {
                    if (data.success) {
                        cartBtn.textContent = "Added to Cart";
                        cartBtn.disabled = true;

                        // Update quantity dropdown
                        const remainingQty = data.remaining_quantity;

                        if (remainingQty > 0) {
                            qtySelect.innerHTML = '';
                            for (let i = 1; i <= remainingQty; i++) {
                                const option = document.createElement('option');
                                option.value = i;
                                option.textContent = i;
                                qtySelect.appendChild(option);
                            }
                        } else {
                            // Sold out - replace qty dropdown and cart button with sold out button
                            qtySelect.parentElement.innerHTML = '<button class="sold-out" disabled>Sold Out</button>';
                            cartBtn.style.display = 'none'; // hide cart button completely
                        }
                    } else {
                        alert(data.error || "Something went wrong.");
                    }
                }).catch(() => alert("Network error."));
            });
        }
    </script>
</body>
</html>
